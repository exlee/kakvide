name: Nightly

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-binary:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: kakvide-macos
          - os: ubuntu-latest
            artifact_name: kakvide-linux

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Stage binary
        run: |
          mkdir -p dist
          tar -czf "dist/${{ matrix.artifact_name }}.tar.gz" -C target/release kakvide

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.tar.gz
          if-no-files-found: error

  build-macos-dmg:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache cargo-bundle binary
        id: cache-cargo-bundle
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-bundle
            ~/.cargo/.crates2.json
            ~/.cargo/.crates.toml
          key: cargo-bundle-v0.11.0-${{ runner.os }}

      - name: Install packaging tools
        run: |
          brew install imagemagick create-dmg

      - name: Install cargo-bundle
        if: steps.cache-cargo-bundle.outputs.cache-hit != 'true'
        run: cargo install cargo-bundle --version 0.11.0 --locked

      - name: Generate macOS icon
        run: rake icon

      - name: Build macOS app bundle
        run: rake bundle

      - name: Create DMG
        run: |
          mkdir -p dist
          create-dmg \
            --volname "Kakvide" \
            --window-pos 200 120 \
            --window-size 640 420 \
            --icon-size 96 \
            --icon "Kakvide.app" 180 170 \
            --app-drop-link 460 170 \
            "dist/Kakvide.dmg" \
            "target/release/bundle/osx/Kakvide.app"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: kakvide-macos-dmg
          path: dist/Kakvide.dmg
          if-no-files-found: error

  release-nightly:
    name: Release nightly artifacts
    runs-on: ubuntu-latest
    needs:
      - build-binary
      - build-macos-dmg

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare release metadata
        id: release-meta
        run: |
          echo "tag=nightly-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "name=Nightly ${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-meta.outputs.tag }}
          name: ${{ steps.release-meta.outputs.name }}
          prerelease: true
          generate_release_notes: true
          files: |
            dist/kakvide-linux/kakvide-linux.tar.gz
            dist/kakvide-macos/kakvide-macos.tar.gz
            dist/kakvide-macos-dmg/Kakvide.dmg
