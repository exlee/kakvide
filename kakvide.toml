font-family = "SF Mono"
font-size = 12.0
mouse-scroll-rate = 0.25
transparent-menubar = true
single-session = false
session-name = "kakvide"

[cell]
underline-offset = 0.0

[display.cursor-shape]
# normal = "block"
# insert = "beam"
# replace = "underline"

[macos]
color-space = "p3"

[keys]
font-scale-up = "Cmd-="
font-scale-down = "Cmd--"
font-scale-reset = "Cmd-0"
window-new = "Cmd-N"
window-close = "Cmd-W"
